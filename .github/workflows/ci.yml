name: Enterprise Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-24.04
    
    # 1. Spin up an ephemeral pgvector container specifically for testing
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: enterprise_password
          POSTGRES_DB: knowledge_hub
        ports:
          - 5432:5432
        # Set health checks to ensure the DB is ready before tests run
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libpq-dev

    - name: Install Python Dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt

    - name: Run Django Security & Unit Tests
      env:
        # Override settings for the CI environment if needed
        DJANGO_SETTINGS_MODULE: core.settings
      run: |
        cd backend
        python manage.py test
