services:
  db:
    image: pgvector/pgvector:pg16
    container_name: knowledge_hub_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: enterprise_password
      POSTGRES_DB: knowledge_hub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
